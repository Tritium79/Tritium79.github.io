<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }} | Tritium79's Blog</title>
        <link rel="stylesheet" href="../../../style.css" />
    
<link rel="stylesheet" href="../../../style.css" />
    
<link rel="stylesheet" href="../../../style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false},
                        {left: "\\(", right: "\\)", display: false},
                        {left: "\\[", right: "\\]", display: true}
                    ],
                    throwOnError: false,
                    trust: true,
                    macros: {
                        "\\f": "#1f(#2)"
                    }
                });
            });
        </script>

        <style>
        .katex-display { overflow: visible !important; }
        .katex-display > .katex { overflow: visible !important; }
        .katex { overflow: visible !important; }
        </style>
    </head>
    <body>
        <header>
            <div class="header-bar">
                <a href="../../../index.html"
                    ><img src="../../../assets/images/avatar.png" alt="avatar"
                /></a>
                <a href="../../../index.html"><h1>Tritium79's Blog</h1></a>
                <span class="current-section">{{ section }}</span>
                <label for="nav-toggle" class="nav-toggle-btn">≡</label>
            </div>
            <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden />

            <nav>
{{ nav_links }}
            </nav>
        </header>
        <main>
            <h2>{{ title }}</h2>
            <p class="post-date">{{ date }}</p>

            {{ content }}
        </main>
        <footer>
            <p>&copy; 2026 <a href="https://Tritium79.github.io">Tritium79</a>. All rights reserved.</p>
        </footer>
    </body>
</html>
