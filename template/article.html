<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }} | Tritium79's Blog</title>
        <link rel="stylesheet" href="../../../style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />

        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ],
                    throwOnError: false
                });
            });
        </script>

        <style>
        main pre {
            padding: 1rem;
            overflow-x: auto;
            border-radius: 4px;
            margin: 1rem 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        main code {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.9em;
        }
        main p code {
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
        }
        main .arithmatex {
            overflow-x: auto;
        }
        .katex-display {
            margin: 1rem 0;
            overflow-x: auto;
        }
        </style>
    </head>
    <body>
        <header>
            <div class="header-bar">
            <a href="../../../index.html"
                ><img src="../../../assets/icons/avatar.png" alt="avatar"
            /></a>
            <a href="../../../index.html"><h1>Tritium79's Blog</h1></a>
            <span class="current-section">{{ section }}</span>
            <label for="nav-toggle" class="nav-toggle-btn">≡</label>
            </div>
            <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden />

            <nav>
                <a href="../../../index.html"><span class="nav-cn">首页</span><span class="sep">/</span><span class="nav-la">Domus</span></a>
                <a href="../../../pages/silvae.html"><span class="nav-cn">随笔</span><span class="sep">/</span><span class="nav-la">Silvae</span></a>
                <a href="../../../pages/commentarii.html"><span class="nav-cn">记录</span><span class="sep">/</span><span class="nav-la">Commentarii</span></a>
                <a href="../../../pages/versiones.html"><span class="nav-cn">译文</span><span class="sep">/</span><span class="nav-la">Versiones</span></a>
                <a href="../../../pages/archivum.html"><span class="nav-cn">存档</span><span class="sep">/</span><span class="nav-la">Archivum</span></a>
                <a href="../../../pages/nexus.html"><span class="nav-cn">友链</span><span class="sep">/</span><span class="nav-la">Nexus</span></a>
                <a href="../../../pages/deme.html"><span class="nav-cn">关于</span><span class="sep">/</span><span class="nav-la">De Me</span></a>
            </nav>
        </header>
        <main>
            <h2>{{ title }}</h2>
            <p class="post-date">{{ date }}</p>

            {{ content }}
        </main>
        <footer>
            <p>&copy; 2026 <a href="https://Tritium79.github.io">Tritium79</a>. All rights reserved.</p>
        </footer>
    </body>
</html>
