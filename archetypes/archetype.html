<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }} | Tritium79's Blog</title>
        <link rel="stylesheet" href="{{ root_path }}style.css" />
        {{ katex }}
    </head>
    <body>
        <header>
            <div class="header-bar">
                <a href="{{ root_path }}pages/deme.html"
                    ><img src="{{ root_path }}assets/images/avatar.png" alt="avatar"
                /></a>
                <a href="{{ root_path }}index.html"><h1>Tritium79's Blog</h1></a>
                <span class="current-section">{{ section }}</span>
                <label for="nav-toggle" class="nav-toggle-btn">≡</label>
            </div>
            <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden />

            <nav>
{{ nav_links }}
            </nav>
        </header>
        <main>
            {{ content }}
        </main>
        <footer>
            <p>{{ footer_content }}</p>
        </footer>
    </body>
</html>
